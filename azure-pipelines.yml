#           variables['System.PullRequest.SourceBranch'],
#           '-automated'
#         ))

- job: test_julien_1
  displayName: Test ${{ variables['Build.Reason'] }}
  pool:
    vmImage: ubuntu-22.04
  steps:
  - script: |
      set -e
      echo "Hello"
      env |sort
