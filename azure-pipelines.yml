# Imports the shared Azure CI tools from the master branch of shotgunsoftware/tk-ci-tools
resources:
  repositories:
    - repository: templates
      type: github
      name: shotgunsoftware/tk-ci-tools
      ref: refs/heads/master
      endpoint: shotgunsoftware

# We want builds to trigger for 3 reasons:
# - The master branch sees new commits
# - Each PR should get rebuilt when commits are added to it.
# - When we tag something
trigger:
  branches:
    include:
    - master
  tags:
    include:
    - v*
pr:
  branches:
    include:
    - "*"

# This pulls in a variable group from Azure. Variables can be encrypted or not.
variables:
- group: deploy-secrets

# Launch into the build pipeline.
jobs:


# 3rd-party package regeneration pipeline.
# Compile-time guard: only runs on pull requests (excludes master, tags, and
# direct pushes to '-automated' branches).
# Runtime guard (job_condition): skips all jobs if the PR source branch ends
# with '-automated', preventing the generated branch's own PR from re-triggering.
# See README.md for details on how to trigger package regeneration.
- ${{ if and(not(endsWith( variables['Build.SourceBranchName'], '-automated')), ne(variables['Build.SourceBranch'], 'refs/heads/master'), not(startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))) }}:
#  - template: resources/python/pipelines/pipelines.yml
#    parameters:
#      branch: $(System.PullRequest.SourceBranch)-automated
  - job: test_julien_1
    displayName: Test 33
    pool:
      vmImage: ubuntu-22.04
    steps:
    - script: |
        set -e
        echo "Hello"
        env |sort
      displayName: Test1

