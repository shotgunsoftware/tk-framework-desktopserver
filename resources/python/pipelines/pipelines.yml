parameters:
  branch: ""

  # Runtime condition applied to the first source job. All downstream jobs
  # cascade-skip automatically via condition: succeeded() when the first job
  # is skipped. Declared here so azure-pipelines.yml owns the opt-in logic.
  # Defaults to 'succeeded()' so the template is usable standalone.
  #
  # In production use (azure-pipelines.yml), this is set to skip all jobs when
  # the PR source branch ends with '-automated' or '-no-rebuild':
  #   - '-automated': auto-generated by this pipeline; prevents infinite loops
  #     where the generated branch's own PR would re-trigger regeneration.
  #   - '-no-rebuild': opt-out convention for PRs that should not regenerate
  #     packages (e.g. CI-only or documentation changes).
  job_condition: "succeeded()"

  # Each entry describes one Python version to build requirements for.
  # Per-version job order: source -> linux -> mac -> windows.
  # Versions are chained sequentially: each version's source job depends on
  # the previous version's windows job via prev.
  python_versions:
    - name: "3.7"
      # No prev - this is the first version; it also creates the branch.

    - name: "3.9"
      prev: "3.7"

    - name: "3.10"
      prev: "3.9"

    - name: "3.11"
      prev: "3.10"

    - name: "3.13"
      prev: "3.11"

  # OS platforms to build binary requirements for, in order.
  # The first platform (linux) depends on the source job for the same version.
  # Subsequent platforms chain via prev.
  # The last platform (windows) acts as the cross-version dependency anchor
  # (source_<next_version> depends on windows_<prev_version>).
  os_platforms:
    - name: linux
      display_name: Linux
      short: Lin
      vm_image: ubuntu-22.04

    - name: mac
      display_name: Mac
      short: Mac
      vm_image: macOS-14
      prev: linux

    - name: windows
      display_name: Windows
      short: Win
      vm_image: windows-2022
      prev: mac

jobs:
- ${{ each pyver in parameters.python_versions }}:

  # -----------------------------------------------------------------
  # Source
  # -----------------------------------------------------------------
  - job: source_${{ replace(pyver.name, '.', '_') }}
    displayName: Py 3rd-Party Pkgs - ${{ pyver.name }} - Src
    ${{ if not(pyver.prev) }}:
      condition: and(succeeded(), ${{ parameters.job_condition }})
    pool:
      vmImage: ubuntu-22.04
    ${{ if pyver.prev }}:
      dependsOn: windows_${{ replace(pyver.prev, '.', '_') }}
    steps:
    - template: template.yml
      parameters:
        python_version: ${{ pyver.name }}

    - ${{ if not(pyver.prev) }}:
      - task: Bash@3
        displayName: Create branch if not exists or update
        inputs:
          targetType: inline
          script: |
            set -e
            git switch ${{ parameters.branch }} || git switch -c ${{ parameters.branch }} origin/$(System.PullRequest.SourceBranch)
            git push -u origin ${{ parameters.branch }}
        env:
          GH_ACCESS_TOKEN: $(GITHUB_ACCESS_TOKEN)

    - task: Bash@3
      displayName: Generate all explicit_requirements ${{ pyver.name }}
      inputs:
        targetType: inline
        script: |
          set -e
          git switch ${{ parameters.branch }}
          python update_requirements.py --clean-pip
        workingDirectory: resources/python
      env:
        GH_ACCESS_TOKEN: $(GITHUB_ACCESS_TOKEN)

    - task: Bash@3
      displayName: Update source requirements ${{ pyver.name }}
      inputs:
        targetType: inline
        script: |
          set -e
          ./install_source_only.sh
          git add src/
          git commit --allow-empty -a -m "Update source requirements ${{ pyver.name }}"
          git push origin ${{ parameters.branch }}
        workingDirectory: resources/python
      env:
        GH_ACCESS_TOKEN: $(GITHUB_ACCESS_TOKEN)

  # -----------------------------------------------------------------
  # Binary (linux -> mac -> windows)
  # -----------------------------------------------------------------
  - ${{ each os in parameters.os_platforms }}:
    - job: ${{ os.name }}_${{ replace(pyver.name, '.', '_') }}
      displayName: Py 3rd-Party Pkgs - ${{ pyver.name }} - ${{ os.short }}
      ${{ if os.prev }}:
        dependsOn: ${{ os.prev }}_${{ replace(pyver.name, '.', '_') }}
      ${{ else }}:
        dependsOn: source_${{ replace(pyver.name, '.', '_') }}
      pool:
        vmImage: ${{ os.vm_image }}
      steps:
      - template: template.yml
        parameters:
          python_version: ${{ pyver.name }}
      - task: Bash@3
        displayName: Install and commit binary requirements
        inputs:
          targetType: inline
          workingDirectory: resources/python
          script: |
            set -e
            git switch ${{ parameters.branch }}
            python install_binary.py
            git add bin/
            git commit --allow-empty -a -m "Update binary requirements in ${{ os.display_name }} Python ${{ pyver.name }}"
            git push origin ${{ parameters.branch }}
        env:
          GH_ACCESS_TOKEN: $(GITHUB_ACCESS_TOKEN)
